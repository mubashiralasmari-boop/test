<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الناموس 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00d4ff;
  --primary-dim: rgba(0,212,255,0.15);
  --bg: #080c18;
  --card: rgba(255,255,255,0.04);
  --border: rgba(0,212,255,0.2);
  --success: #00ff88;
  --danger: #ff4455;
  --warn: #ffaa00;
  --gold: #ffd700;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; padding:20px 16px; }
.screen.active { display:flex; flex-direction:column; }

/* ===== SETUP SCREEN ===== */
#s-setup {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(0,212,255,0.08), transparent 60%),
              var(--bg);
}

.logo {
  text-align:center;
  margin: 20px 0 32px;
}
.logo-title {
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 900;
  color: var(--primary);
  text-shadow: 0 0 40px rgba(0,212,255,0.5), 0 0 80px rgba(0,212,255,0.2);
  letter-spacing: 6px;
  line-height: 1;
}
.logo-sub {
  font-size: 1rem;
  color: rgba(125,211,252,0.6);
  margin-top: 6px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
}

.card-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

label {
  display: block;
  font-size: 0.85rem;
  color: rgba(125,211,252,0.7);
  margin-bottom: 5px;
}

input, textarea {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  padding: 10px 14px;
  margin-bottom: 10px;
  outline: none;
  text-align: right;
  direction: rtl;
  transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: var(--primary); }
textarea { min-height: 60px; resize: none; }

/* جولة واحدة */
.round-item {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}
.round-item .round-num {
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 700;
  margin-bottom: 6px;
}
.round-delete {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,68,85,0.15);
  border: 1px solid rgba(255,68,85,0.3);
  border-radius: 8px;
  color: var(--danger);
  width: 30px;
  height: 30px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer;
  font-size: 1rem;
}

/* لاعب */
.player-item {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.player-item input { margin-bottom: 0; flex: 1; }
.player-color {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  flex-shrink: 0;
}
.player-del {
  width: 30px; height: 30px;
  background: rgba(255,68,85,0.15);
  border: 1px solid rgba(255,68,85,0.3);
  border-radius: 8px;
  color: var(--danger);
  display: flex; align-items:center; justify-content:center;
  cursor: pointer;
  font-size: 1rem;
  flex-shrink: 0;
}

/* أزرار */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 13px;
  font-family: 'Tajawal', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, var(--primary), #0099cc); color: #000; }
.btn-success { background: linear-gradient(135deg, var(--success), #00aa55); color: #000; }
.btn-danger  { background: linear-gradient(135deg, var(--danger), #cc0022); color: #fff; }
.btn-warn    { background: linear-gradient(135deg, var(--warn), #ff7700); color: #000; }
.btn-ghost   { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; }
.btn-sm      { width: auto; padding: 8px 16px; font-size: 0.9rem; margin-bottom: 0; }
.btn-gold    { background: linear-gradient(135deg, var(--gold), #ffaa00); color: #000; }

/* ===== GAME SCREEN ===== */
#s-game {
  padding: 0;
  background: radial-gradient(ellipse 100% 50% at 50% -10%, rgba(0,212,255,0.1), transparent 55%),
              var(--bg);
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.game-header-title {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--primary);
  text-shadow: 0 0 20px rgba(0,212,255,0.4);
}

.round-badge {
  background: var(--primary-dim);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.85rem;
  color: var(--primary);
  font-weight: 700;
}

.hint-bar {
  text-align: center;
  padding: 8px 16px;
  font-size: 0.9rem;
  color: rgba(125,211,252,0.7);
  background: rgba(0,0,0,0.2);
  min-height: 35px;
}

/* لوحة الجملة */
.phrase-area {
  padding: 20px 16px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  min-height: 140px;
  align-content: center;
}

.word-wrap { display: flex; gap: 6px; direction: rtl; }

.tile {
  width: clamp(36px, 9vw, 60px);
  height: clamp(44px, 11vw, 72px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1rem, 4vw, 1.8rem);
  font-weight: 900;
  border-radius: 10px;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}

.tile-hidden {
  background: linear-gradient(135deg, #102040, #0a1830);
  border: 2px solid rgba(0,212,255,0.35);
  box-shadow: 0 3px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}

.tile-hidden::after {
  content: '';
  position: absolute;
  bottom: 5px; left: 50%;
  transform: translateX(-50%);
  width: 55%; height: 2px;
  background: rgba(0,212,255,0.35);
  border-radius: 2px;
}

.tile-shown {
  background: linear-gradient(135deg, var(--primary), #007aaa);
  border: 2px solid var(--primary);
  box-shadow: 0 0 16px rgba(0,212,255,0.4), 0 3px 10px rgba(0,0,0,0.3);
  color: #000;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  0%   { transform: rotateY(90deg) scale(0.6); opacity:0; }
  100% { transform: rotateY(0deg)  scale(1);   opacity:1; }
}

.tile-space {
  background: transparent; border: none; box-shadow: none;
  width: 20px;
}

/* آخر حرف */
.last-guess-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 16px;
}

.guess-box {
  width: 54px; height: 54px;
  border-radius: 12px;
  display: flex; align-items:center; justify-content:center;
  font-size: 1.6rem; font-weight: 900;
  transition: all 0.3s;
}
.guess-empty  { background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.1); }
.guess-correct{ background: linear-gradient(135deg, var(--success), #00aa55); color:#000; box-shadow: 0 0 20px rgba(0,255,136,0.4); animation: bounce 0.5s ease; }
.guess-wrong  { background: linear-gradient(135deg, var(--danger), #aa0022); color:#fff; box-shadow: 0 0 20px rgba(255,68,85,0.4); animation: shake 0.5s ease; }

.guess-label { font-size: 0.9rem; color: rgba(125,211,252,0.6); }
.guess-result { font-size: 1rem; font-weight: 700; min-width: 80px; }

@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
@keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* لوحة المفاتيح */
.keyboard-wrap {
  padding: 10px 12px;
  background: rgba(0,0,0,0.2);
  border-top: 1px solid var(--border);
}

.keyboard-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.key {
  aspect-ratio: 1;
  background: linear-gradient(135deg, #102040, #0a1830);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 8px;
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: clamp(0.9rem, 3.5vw, 1.3rem);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items:center; justify-content:center;
}
.key:active { transform: scale(0.9); }
.key.k-correct { background: rgba(0,255,136,0.15); border-color: rgba(0,255,136,0.4); color: var(--success); pointer-events:none; }
.key.k-wrong   { background: rgba(255,68,85,0.1);  border-color: rgba(255,68,85,0.25); color: rgba(255,255,255,0.25); pointer-events:none; }

/* لاعبون في اللعبة */
.players-row {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
}

.player-chip {
  flex-shrink: 0;
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 8px 14px;
  text-align: center;
  min-width: 90px;
  transition: all 0.25s;
  cursor: pointer;
}
.player-chip.active {
  border-color: var(--primary);
  box-shadow: 0 0 16px rgba(0,212,255,0.3);
  transform: translateY(-2px);
}
.chip-name { font-size: 0.85rem; color: rgba(255,255,255,0.7); margin-bottom: 3px; }
.chip-score { font-size: 1.2rem; font-weight: 900; }

/* controls strip */
.controls-strip {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.controls-strip .btn { width: auto; flex: 1; min-width: 120px; padding: 12px 8px; font-size: 0.9rem; margin-bottom: 0; }

/* ===== ROUND WIN OVERLAY ===== */
#o-roundwin {
  display: none;
  position: fixed; inset:0; z-index:200;
  background: rgba(0,0,0,0.88);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 30px;
}
#o-roundwin.show { display: flex; animation: fadeIn 0.4s ease; }

.win-emoji { font-size: 5rem; margin-bottom: 10px; animation: floatAnim 2s ease-in-out infinite; }
.win-title { font-size: clamp(2rem,8vw,3.5rem); font-weight:900; color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.6); }
.win-winner { font-size: 1.4rem; color: #fff; margin: 10px 0; }
.win-phrase-text { font-size: 1.2rem; color: var(--primary); margin-bottom: 6px; }
.win-phrase-val { font-size: 1.5rem; font-weight:700; color: #fff; margin-bottom: 24px; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes floatAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

/* ===== GAME OVER SCREEN ===== */
#s-gameover {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(255,215,0,0.08), transparent 60%), var(--bg);
  align-items: center;
  justify-content: center;
  text-align: center;
}

.gameover-title {
  font-size: clamp(2.5rem,10vw,5rem);
  font-weight:900;
  color: var(--gold);
  text-shadow: 0 0 50px rgba(255,215,0,0.5);
  margin-bottom: 10px;
  animation: floatAnim 2.5s ease-in-out infinite;
}

.leaderboard {
  width: 100%;
  max-width: 360px;
  margin: 20px auto;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: all 0.3s;
}
.lb-row:first-child {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.3);
  box-shadow: 0 0 20px rgba(255,215,0,0.1);
}

.lb-rank { font-size: 1.4rem; width: 32px; text-align:center; }
.lb-name { flex:1; font-size: 1.1rem; font-weight:700; text-align:right; }
.lb-score { font-size: 1.2rem; font-weight:900; color: var(--primary); }

/* ===== LOGIN SCREEN ===== */
#s-login {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(0,212,255,0.08), transparent 60%), var(--bg);
  align-items: center;
  justify-content: center;
  text-align: center;
}
.login-box {
  width: 100%;
  max-width: 340px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 32px 24px;
}
.login-logo {
  font-size: clamp(2.5rem, 10vw, 4rem);
  font-weight: 900;
  color: var(--primary);
  text-shadow: 0 0 40px rgba(0,212,255,0.5);
  letter-spacing: 4px;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 0.9rem;
  color: rgba(125,211,252,0.5);
  margin-bottom: 28px;
}
.login-error {
  background: rgba(255,68,85,0.12);
  border: 1px solid rgba(255,68,85,0.3);
  border-radius: 10px;
  color: var(--danger);
  padding: 10px;
  font-size: 0.9rem;
  margin-bottom: 12px;
  display: none;
}
.login-error.show { display: block; }

/* ===== ADMIN SCREEN ===== */
#s-admin {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(255,170,0,0.06), transparent 60%), var(--bg);
  align-items: center;
}
.admin-header {
  width: 100%;
  max-width: 420px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.admin-title {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--warn);
}
.subscriber-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.sub-info { flex: 1; }
.sub-name { font-size: 1rem; font-weight: 700; color: #fff; }
.sub-pass { font-size: 0.8rem; color: rgba(125,211,252,0.6); margin-top: 2px; }
.sub-del {
  width: 34px; height: 34px;
  background: rgba(255,68,85,0.15);
  border: 1px solid rgba(255,68,85,0.3);
  border-radius: 9px;
  color: var(--danger);
  display: flex; align-items:center; justify-content:center;
  cursor: pointer; font-size: 1rem; flex-shrink: 0;
}
.add-sub-form {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.add-sub-form input { margin-bottom: 0; flex: 1; min-width: 120px; }
.save-notice {
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.25);
  border-radius: 10px;
  color: var(--success);
  padding: 10px 14px;
  font-size: 0.9rem;
  margin-top: 10px;
  text-align: center;
  display: none;
}
.save-notice.show { display: block; }

/* confetti */
.confetti-piece {
  position: fixed;
  width: 8px; height: 14px;
  opacity: 0;
  animation: confettiFall linear forwards;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}
</style>
</head>
<body>

<!-- ===================== ADMIN ===================== -->
<div class="screen" id="s-admin">
  <div class="admin-header" style="max-width:420px; width:100%;">
    <div class="admin-title">⚙️ لوحة الأدمن</div>
    <button class="btn btn-ghost btn-sm" onclick="showScreen('s-login')">خروج</button>
  </div>

  <div style="width:100%; max-width:420px;">
    <div class="card">
      <div class="card-title">👥 المشتركين</div>
      <div id="admin-subs-list"></div>

      <div class="add-sub-form">
        <input type="text"     id="new-sub-user" placeholder="اسم المستخدم" />
        <input type="text"     id="new-sub-pass" placeholder="كلمة السر" />
        <button class="btn btn-primary btn-sm" onclick="addSubscriber()">＋ إضافة</button>
      </div>
    </div>

    <div class="save-notice" id="save-notice">
      ✅ تم التحديث
    </div>

    <button class="btn btn-ghost"   onclick="showScreen('s-login')">↩️ رجوع لصفحة الدخول</button>
  </div>
</div>

<!-- ===================== LOGIN ===================== -->
<div class="screen active" id="s-login">
  <div class="login-box">
    <div class="login-logo">الناموس</div>
    <div class="login-sub">لعبة تخمين الجمل العربية</div>
    <div class="login-error" id="login-error">اسم المستخدم أو كلمة السر غلط!</div>
    <label>اسم المستخدم</label>
    <input type="text" id="login-user" placeholder="أدخل اسم المستخدم" autocomplete="off" />
    <label>كلمة السر</label>
    <input type="password" id="login-pass" placeholder="أدخل كلمة السر" />
    <button class="btn btn-primary" style="margin-top:6px;" onclick="doLogin()">🔐 دخول</button>
    <button class="btn btn-ghost" style="margin-top:0; font-size:0.85rem; opacity:0.5;" onclick="showAdminModal()">دخول الأدمن</button>
  </div>
</div>

<!-- Admin Password Modal -->
<div id="admin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center;">
  <div style="background:#0d1a2e; border:1px solid rgba(255,170,0,0.3); border-radius:18px; padding:28px 24px; width:90%; max-width:300px; text-align:center;">
    <div style="font-size:1.2rem; font-weight:700; color:var(--warn); margin-bottom:16px;">🔐 دخول الأدمن</div>
    <input type="password" id="admin-pass-input" placeholder="كلمة سر الأدمن" style="margin-bottom:8px;" />
    <div id="admin-pass-error" style="color:var(--danger); font-size:0.85rem; margin-bottom:8px; display:none;">كلمة السر غلط!</div>
    <button class="btn btn-warn" onclick="doAdminLogin()">دخول</button>
    <button class="btn btn-ghost" style="margin-bottom:0;" onclick="hideAdminModal()">إلغاء</button>
  </div>
</div>

<!-- ===================== SETUP ===================== -->
<div class="screen" id="s-setup">

  <div class="logo">
    <div class="logo-title">الناموس</div>
    <div class="logo-sub">لعبة تخمين الجمل العربية</div>
  </div>

  <!-- الجولات -->
  <div class="card">
    <div class="card-title">📝 الجولات والجمل</div>
    <div id="rounds-list"></div>
    <button class="btn btn-ghost" onclick="addRound()">＋ إضافة جولة</button>
  </div>

  <!-- اللاعبون -->
  <div class="card">
    <div class="card-title">👥 اللاعبون</div>
    <div id="players-list"></div>
    <button class="btn btn-ghost" onclick="addPlayer()">＋ إضافة لاعب</button>
  </div>

  <button class="btn btn-success" onclick="startGame()">🚀 بدء اللعبة</button>
</div>

<!-- ===================== GAME ===================== -->
<div class="screen" id="s-game">

  <div class="game-header">
    <div class="game-header-title">الناموس</div>
    <div class="round-badge" id="g-round-badge">جولة ١</div>
  </div>

  <div class="players-row" id="g-players-row"></div>

  <div class="hint-bar" id="g-hint-bar"></div>

  <div class="phrase-area" id="g-phrase-area"></div>

  <div class="last-guess-row">
    <div class="guess-label">آخر حرف:</div>
    <div class="guess-box guess-empty" id="g-guess-box">؟</div>
    <div class="guess-result" id="g-guess-result"></div>
  </div>

  <div class="keyboard-wrap">
    <div class="keyboard-grid" id="g-keyboard"></div>
  </div>

  <div class="controls-strip">
    <button class="btn btn-gold"    onclick="phraseGuessed()">🏆 حزر الجملة!</button>
    <button class="btn btn-ghost"   onclick="nextPlayerTurn()">⏭️ التالي</button>
    <button class="btn btn-warn"    onclick="skipRound()">⏩ تخطي الجولة</button>
    <button class="btn btn-danger"  onclick="confirmEndGame()">🔄 إنهاء</button>
  </div>
</div>

<!-- ===================== ROUND WIN OVERLAY ===================== -->
<div id="o-roundwin">
  <div class="win-emoji">🎉</div>
  <div class="win-title">صحيح!</div>
  <div class="win-winner" id="ow-winner"></div>
  <div class="win-phrase-text">الجملة كانت:</div>
  <div class="win-phrase-val" id="ow-phrase"></div>
  <button class="btn btn-primary" style="max-width:280px;" onclick="proceedAfterRound()">▶️ الجولة التالية</button>
  <button class="btn btn-ghost"   style="max-width:280px; margin-top:0;" onclick="proceedAfterRound(true)">🏁 عرض النتائج</button>
</div>

<!-- ===================== GAME OVER ===================== -->
<div class="screen" id="s-gameover">
  <div class="gameover-title">🏆 انتهت اللعبة!</div>
  <div style="color:rgba(255,255,255,0.6); margin-bottom:4px;">ترتيب اللاعبين</div>
  <div class="leaderboard" id="go-leaderboard"></div>
  <button class="btn btn-primary" style="max-width:300px; margin-top:16px;" onclick="restartGame()">🔄 لعبة جديدة</button>
</div>

<script>
// =========== STATE ===========
let rounds   = [];  // [{phrase, hint}]
let players  = [];  // [{id, name, color, score}]
let pCounter = 0;
let rCounter = 0;

let gRoundIdx   = 0;
let gCurrentP   = 0;  // index
let gRevealed   = []; // حروف مكشوفة
let gLastGuess  = null;

const ARABIC = ['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي','ى','ء','ة'];
const COLORS  = ['#00d4ff','#ff6b6b','#ffd700','#00ff88','#ff88cc','#88bbff','#ffaa44'];

// =========== SETUP ===========
function addRound() {
  rCounter++;
  rounds.push({ id: rCounter, phrase: '', hint: '' });
  renderRounds();
}

function removeRound(id) {
  rounds = rounds.filter(r => r.id !== id);
  renderRounds();
}

function renderRounds() {
  const el = document.getElementById('rounds-list');
  el.innerHTML = '';
  rounds.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'round-item';
    div.innerHTML = `
      <div class="round-num">الجولة ${i+1}</div>
      <button class="round-delete" onclick="removeRound(${r.id})">✕</button>
      <label>الجملة السرية</label>
      <input type="text" placeholder="مثال: كرة القدم" value="${r.phrase}"
        oninput="rounds[${i}].phrase=this.value" />
      <label>تلميح (اختياري)</label>
      <input type="text" placeholder="مثال: نوع رياضة" value="${r.hint}"
        oninput="rounds[${i}].hint=this.value" />
    `;
    el.appendChild(div);
  });
}

function addPlayer() {
  pCounter++;
  players.push({ id: pCounter, name: '', color: COLORS[(players.length) % COLORS.length], score: 0 });
  renderPlayers();
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  renderPlayers();
}

function renderPlayers() {
  const el = document.getElementById('players-list');
  el.innerHTML = '';
  players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `
      <input type="text" placeholder="اسم اللاعب ${i+1}" value="${p.name}"
        oninput="players[${i}].name=this.value" />
      <input type="color" class="player-color" value="${p.color}"
        oninput="players[${i}].color=this.value" />
      <button class="player-del" onclick="removePlayer(${p.id})">✕</button>
    `;
    el.appendChild(div);
  });
}

function startGame() {
  // تحقق
  const validRounds = rounds.filter(r => r.phrase.trim());
  if (validRounds.length === 0) { alert('أضف جولة واحدة على الأقل!'); return; }
  const validPlayers = players.filter(p => p.name.trim());
  if (validPlayers.length === 0) { alert('أضف لاعباً واحداً على الأقل!'); return; }

  // إعادة تعيين
  rounds   = validRounds;
  players  = validPlayers.map(p => ({ ...p, score: 0 }));
  gRoundIdx  = 0;
  gCurrentP  = 0;

  showScreen('s-game');
  loadRound();
}

// =========== GAME ===========
function loadRound() {
  const round = rounds[gRoundIdx];
  gRevealed  = [];
  gLastGuess = null;

  // badge
  document.getElementById('g-round-badge').textContent = `جولة ${gRoundIdx + 1} / ${rounds.length}`;

  // hint
  const hintEl = document.getElementById('g-hint-bar');
  hintEl.textContent = round.hint ? `💡 تلميح: ${round.hint}` : 'خمّن الجملة!';

  renderPhrase();
  renderKeyboard();
  renderPlayersRow();
  renderLastGuess(null);
}

function renderPhrase() {
  const phrase = rounds[gRoundIdx].phrase;
  const area   = document.getElementById('g-phrase-area');
  area.innerHTML = '';

  phrase.split(' ').forEach((word, wi) => {
    const wg = document.createElement('div');
    wg.className = 'word-wrap';

    [...word].forEach(char => {
      const tile = document.createElement('div');
      const isAr = isArabic(char);
      const shown = !isAr || gRevealed.includes(char);
      tile.className = `tile ${shown ? 'tile-shown' : 'tile-hidden'}`;
      tile.textContent = shown ? char : '';
      wg.appendChild(tile);
    });

    area.appendChild(wg);

    if (wi < phrase.split(' ').length - 1) {
      const sp = document.createElement('div');
      sp.className = 'tile tile-space';
      area.appendChild(sp);
    }
  });
}

function renderKeyboard() {
  const kb = document.getElementById('g-keyboard');
  kb.innerHTML = '';
  const phrase = rounds[gRoundIdx].phrase;

  ARABIC.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'key';
    btn.textContent = letter;

    if (gRevealed.includes(letter)) {
      btn.classList.add(phrase.includes(letter) ? 'k-correct' : 'k-wrong');
    } else {
      btn.onclick = () => guessLetter(letter);
    }
    kb.appendChild(btn);
  });
}

function renderPlayersRow() {
  const row = document.getElementById('g-players-row');
  row.innerHTML = '';
  players.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = `player-chip ${i === gCurrentP ? 'active' : ''}`;
    chip.style.borderColor = i === gCurrentP ? p.color : 'rgba(255,255,255,0.1)';
    chip.innerHTML = `
      <div class="chip-name">${p.name}</div>
      <div class="chip-score" style="color:${p.color}">${p.score}</div>
    `;
    chip.onclick = () => { gCurrentP = i; renderPlayersRow(); };
    row.appendChild(chip);
  });
}

function renderLastGuess(guess) {
  const box    = document.getElementById('g-guess-box');
  const result = document.getElementById('g-guess-result');

  if (!guess) {
    box.className = 'guess-box guess-empty';
    box.textContent = '؟';
    result.textContent = '';
    return;
  }

  box.textContent = guess.letter;
  if (guess.correct) {
    box.className = 'guess-box guess-correct';
    result.textContent = '✅ موجود!';
    result.style.color = 'var(--success)';
  } else {
    box.className = 'guess-box guess-wrong';
    result.textContent = '❌ غير موجود';
    result.style.color = 'var(--danger)';
  }
}

function guessLetter(letter) {
  const phrase = rounds[gRoundIdx].phrase;
  if (gRevealed.includes(letter)) return;

  gRevealed.push(letter);
  const isCorrect = phrase.includes(letter);

  // نقاط
  if (isCorrect) {
    const count = [...phrase].filter(c => c === letter).length;
    players[gCurrentP].score += count * 100;
  }

  gLastGuess = { letter, correct: isCorrect };
  renderLastGuess(gLastGuess);
  renderPhrase();
  renderKeyboard();
  renderPlayersRow();

  // تحقق هل انكشفت كل الحروف تلقائياً
  const allRevealed = [...phrase].filter(isArabic).every(c => gRevealed.includes(c));
  if (allRevealed) {
    setTimeout(() => showRoundWin(null), 700);
  }
}

function phraseGuessed() {
  // اللاعب الحالي حزر الجملة كاملة → مكافأة
  players[gCurrentP].score += 500;
  showRoundWin(gCurrentP);
}

function showRoundWin(winnerIdx) {
  const phrase = rounds[gRoundIdx].phrase;
  // اكشف كل الحروف على الشاشة
  gRevealed = [...new Set([...phrase].filter(isArabic))];
  renderPhrase();

  const ow = document.getElementById('o-roundwin');
  const winnerEl = document.getElementById('ow-winner');
  const phraseEl = document.getElementById('ow-phrase');

  if (winnerIdx !== null && winnerIdx !== undefined) {
    winnerEl.textContent = `🏅 الفائز: ${players[winnerIdx].name}`;
    winnerEl.style.color = players[winnerIdx].color;
    launchConfetti();
  } else {
    winnerEl.textContent = 'انكشفت كل الحروف!';
    winnerEl.style.color = 'rgba(255,255,255,0.6)';
  }

  phraseEl.textContent = phrase;
  ow.classList.add('show');
}

function proceedAfterRound(forceEnd = false) {
  document.getElementById('o-roundwin').classList.remove('show');

  const isLast = gRoundIdx >= rounds.length - 1;

  if (forceEnd || isLast) {
    showGameOver();
  } else {
    gRoundIdx++;
    loadRound();
  }
}

function nextPlayerTurn() {
  gCurrentP = (gCurrentP + 1) % players.length;
  renderPlayersRow();
}

function skipRound() {
  if (!confirm('تريد تخطي هذه الجولة؟')) return;
  proceedAfterRound(false);
}

function confirmEndGame() {
  if (!confirm('إنهاء اللعبة وعرض النتائج؟')) return;
  showGameOver();
}

function showGameOver() {
  showScreen('s-gameover');
  renderLeaderboard();
  launchConfetti(80);
}

function renderLeaderboard() {
  const lb = document.getElementById('go-leaderboard');
  lb.innerHTML = '';

  const sorted = [...players].sort((a, b) => b.score - a.score);
  const medals = ['🥇','🥈','🥉'];

  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `
      <div class="lb-rank">${medals[i] || (i+1)}</div>
      <div class="lb-name" style="color:${p.color}">${p.name}</div>
      <div class="lb-score">${p.score} نقطة</div>
    `;
    lb.appendChild(row);
    row.style.animationDelay = (i * 0.1) + 's';
  });
}

function restartGame() {
  // إعادة كل شيء
  rounds   = [];
  players  = [];
  pCounter = 0;
  rCounter = 0;
  showScreen('s-setup');
  document.getElementById('rounds-list').innerHTML = '';
  document.getElementById('players-list').innerHTML = '';
  // أضف جولة ولاعبين أوليين
  addRound(); addRound();
  addPlayer(); addPlayer();
}

// =========== HELPERS ===========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function isArabic(char) {
  return /[\u0600-\u06FF]/.test(char);
}

function launchConfetti(count = 60) {
  const colors = ['#00d4ff','#ffd700','#00ff88','#ff6b6b','#ff88cc','#ffaa44'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*0.8}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// =========== SUPABASE CONFIG ===========
const SUPABASE_URL = 'https://mouszggbyvoxwprhxxvs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdXN6Z2dieXZveHdwcmh4eHZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzgyNDAsImV4cCI6MjA4ODAxNDI0MH0.xPuXjz45tKUi6KrCn5m635d22tLOCYmuHWqgAXycXnk';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.method === 'POST' ? 'return=representation' : 'return=representation',
      ...options.headers
    },
    ...options
  });

  // debug
  if (!res.ok && res.status !== 204) {
    const text = await res.text();
    console.error('Supabase error:', res.status, text);
    throw new Error(text || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

// =========== LOGIN ===========
const ADMIN_PASSWORD = 'admin2024';

async function doLogin() {
  const user   = document.getElementById('login-user').value.trim();
  const pass   = document.getElementById('login-pass').value.trim();
  const errEl  = document.getElementById('login-error');
  const btnEl  = document.querySelector('#s-login .btn-primary');

  if (!user || !pass) { errEl.classList.add('show'); return; }

  btnEl.textContent = '⏳ جاري التحقق...';
  btnEl.disabled = true;

  try {
    const data = await sbFetch(`subscribers?username=eq.${encodeURIComponent(user)}&password=eq.${encodeURIComponent(pass)}&select=id`);
    if (data && data.length > 0) {
      errEl.classList.remove('show');
      showScreen('s-setup');
    } else {
      errEl.classList.add('show');
      document.getElementById('login-pass').value = '';
    }
  } catch(e) {
    errEl.textContent = '⚠️ خطأ في الاتصال، تحقق من الإنترنت';
    errEl.classList.add('show');
  }

  btnEl.textContent = '🔐 دخول';
  btnEl.disabled = false;
}

function showAdminModal() {
  const modal = document.getElementById('admin-modal');
  modal.style.display = 'flex';
  document.getElementById('admin-pass-input').value = '';
  document.getElementById('admin-pass-error').style.display = 'none';
  setTimeout(() => document.getElementById('admin-pass-input').focus(), 100);
}

function hideAdminModal() {
  document.getElementById('admin-modal').style.display = 'none';
}

function doAdminLogin() {
  const pass = document.getElementById('admin-pass-input').value;
  if (pass === ADMIN_PASSWORD) {
    hideAdminModal();
    showScreen('s-admin');
    renderAdminSubs();
  } else {
    document.getElementById('admin-pass-error').style.display = 'block';
    document.getElementById('admin-pass-input').value = '';
  }
}

function showAdminLogin() { showAdminModal(); }

// =========== ADMIN ===========
async function renderAdminSubs() {
  const list = document.getElementById('admin-subs-list');
  list.innerHTML = '<div style="color:rgba(255,255,255,0.4);text-align:center;padding:14px;">⏳ جاري التحميل...</div>';

  try {
    const data = await sbFetch('subscribers?select=id,username,password,created_at&order=created_at.desc');
    list.innerHTML = '';

    if (!data || data.length === 0) {
      list.innerHTML = '<div style="color:rgba(255,255,255,0.3);text-align:center;padding:10px;">لا يوجد مشتركين</div>';
      return;
    }

    data.forEach(u => {
      const row = document.createElement('div');
      row.className = 'subscriber-row';
      const date = new Date(u.created_at).toLocaleDateString('ar-SA');
      row.innerHTML = `
        <div class="sub-info">
          <div class="sub-name">👤 ${u.username}</div>
          <div class="sub-pass">🔑 ${u.password} &nbsp;·&nbsp; 📅 ${date}</div>
        </div>
        <div class="sub-del" onclick="deleteSubscriber(${u.id}, '${u.username}')">✕</div>
      `;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<div style="color:var(--danger);text-align:center;padding:10px;">⚠️ خطأ في الاتصال</div>';
  }
}

async function addSubscriber() {
  const user = document.getElementById('new-sub-user').value.trim();
  const pass = document.getElementById('new-sub-pass').value.trim();
  const btn  = document.querySelector('.add-sub-form .btn-primary');

  if (!user || !pass) { alert('أدخل الاسم وكلمة السر!'); return; }

  btn.textContent = '⏳';
  btn.disabled = true;

  try {
    await sbFetch('subscribers', {
      method: 'POST',
      body: JSON.stringify({ username: user, password: pass })
    });
    document.getElementById('new-sub-user').value = '';
    document.getElementById('new-sub-pass').value = '';
    showSaveNotice('✅ تمت الإضافة!');
    renderAdminSubs();
  } catch(e) {
    alert('خطأ: ' + (e.message.includes('duplicate') ? 'هذا المستخدم موجود مسبقاً!' : e.message));
  }

  btn.textContent = '＋ إضافة';
  btn.disabled = false;
}

async function deleteSubscriber(id, name) {
  if (!confirm(`حذف "${name}"؟`)) return;
  try {
    await sbFetch(`subscribers?id=eq.${id}`, { method: 'DELETE' });
    showSaveNotice('🗑️ تم الحذف');
    renderAdminSubs();
  } catch(e) {
    alert('خطأ في الحذف: ' + e.message);
  }
}

function showSaveNotice(msg = '✅ تم التحديث') {
  const el = document.getElementById('save-notice');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('s-login').classList.contains('active')) {
    doLogin();
  }
  if (e.key === 'Enter' && document.getElementById('admin-modal').style.display === 'flex') {
    doAdminLogin();
  }
  if (e.key === 'Escape') {
    hideAdminModal();
  }
});

// =========== INIT ===========
addRound(); addRound();
addPlayer(); addPlayer();
</script>
</body>
